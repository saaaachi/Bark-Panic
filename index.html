<body oncontextmenu="return false;">

    <div id="ad-top"><iframe id="frame-top" src="ad.html?pos=top"></iframe></div>

        <canvas id="gameCanvas"></canvas>

        <div id="startScreen">

                <h1 id="menuTitle">Bark Panic</h1>
                <p id="gameDesc" style="margin: 5px 0; font-size: 14px; color: #666;">泥棒が来たらタップで吠えて追い払え！</p>
                <p id="best-info">BEST: <span id="best-ui">0</span></p>
            </div>

            <div id="ad-middle-container">
                <div id="im-8b492cea6667490da71c488bdcc7cfc8">
                    <script async src="https://imp-adedge.i-mobile.co.jp/script/v1/spot.js?20220104"></script>
                    <script>(window.adsbyimobile=window.adsbyimobile||[]).push({pid:84561,mid:590804,asid:1924211,type:"banner",display:"inline",elementid:"im-8b492cea6667490da71c488bdcc7cfc8"})</script>
                </div>
            </div>

            <div class="btn-group">
                <button id="goButton">★ 家を守る！ ★</button>
                <a href="https://saaaachi.github.io/" class="link-btn">他のゲームへ</a>

        </div>

        <div id="bigAdScreen">

    <script>
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d"), ui = document.getElementById("ui"), startScreen = document.getElementById("startScreen"), menuTitle = document.getElementById("menuTitle"), gameDesc = document.getElementById("gameDesc"), adMid = document.getElementById("ad-middle-container"), goButton = document.getElementById("goButton"), bestUi = document.getElementById("best-ui"), gameOuter = document.getElementById("game-outer");

        function resize() { canvas.width = gameOuter.clientWidth; canvas.height = gameOuter.clientHeight; }
        window.addEventListener('resize', resize);
        resize();

        let score = 0, bestScore = localStorage.getItem("bark_panic_best") || 0, playCount = 0;
        let gameActive = false, enemies = [], spawnTimer, animationId;
        bestUi.innerText = bestScore;

        goButton.onclick = () => {
            startScreen.style.display = "none"; adMid.style.display = "none";
            gameActive = true; score = 0; enemies = [];
            ui.innerText = "GUARD: 0";
            spawnEnemy(); update();
        };

        function spawnEnemy() {
            if(!gameActive) return;
            const side = Math.floor(Math.random()*4);
            let x, y;
            if(side===0) { x=Math.random()*canvas.width; y=-30; }
            else if(side===1) { x=canvas.width+30; y=Math.random()*canvas.height; }
            else if(side===2) { x=Math.random()*canvas.width; y=canvas.height+30; }
            else { x=-30; y=Math.random()*canvas.height; }
            enemies.push({x, y, speed: 1.5 + (score/25)});
            spawnTimer = setTimeout(spawnEnemy, Math.max(400, 1000 - (score*12)));
        }

        function handleTap(e) {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const tx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const ty = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            for(let i=enemies.length-1; i>=0; i--) {
                let d = Math.sqrt((tx-enemies[i].x)**2 + (ty-enemies[i].y)**2);
                if(d < 50) { enemies.splice(i, 1); score++; ui.innerText = "GUARD: "+score; }
            }
        }
        canvas.addEventListener("touchstart", (e) => { handleTap(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener("mousedown", handleTap);

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0,0,canvas.width, canvas.height);
            const cx = canvas.width/2, cy = canvas.height/2;
            ctx.font = "70px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText("🏠", cx, cy);
            ctx.font = "40px Arial";
            for(let i=enemies.length-1; i>=0; i--) {
                let en = enemies[i];
                let angle = Math.atan2(cy - en.y, cx - en.x);
                en.x += Math.cos(angle) * en.speed; en.y += Math.sin(angle) * en.speed;
                ctx.fillText("👤", en.x, en.y);
                if(Math.sqrt((cx-en.x)**2 + (cy-en.y)**2) < 45) { gameOver(); return; }
            }
            animationId = requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false; playCount++;
            clearTimeout(spawnTimer);
            cancelAnimationFrame(animationId);
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem("bark_panic_best", bestScore);
                bestUi.innerText = bestScore;
            }
            menuTitle.innerText = "家が荒らされた！💦";
            menuTitle.style.color = "#d32f2f";
            gameDesc.style.display = "block";
            gameDesc.innerText = "FINAL SCORE: " + score;
            goButton.innerText = "お待ちください..."; goButton.disabled = true;
            adMid.style.display = "flex"; adMid.style.opacity = "0.4";
            startScreen.style.display = "flex";

            setTimeout(() => { adMid.style.opacity = "1"; goButton.disabled = false; goButton.innerText = "もう一度守る！"; }, 1500);
            if (playCount % 2 === 0) { setTimeout(showBigAd, 500); }
        }

        function showBigAd() {
            const screen = document.getElementById("bigAdScreen"), closeBtn = document.getElementById("ad-close-btn");
            document.getElementById("ad-large-frame").src = "./ad.large.html?t=" + Date.now();
            screen.style.display = "flex"; let countdown = 5; closeBtn.style.display = "flex"; closeBtn.innerText = countdown; closeBtn.style.pointerEvents = "none";
            const timerInt = setInterval(() => { countdown--; closeBtn.innerText = countdown; if (countdown <= 0) { clearInterval(timerInt); closeBtn.innerText = "×"; closeBtn.style.pointerEvents = "auto"; } }, 1000);
        }
        function closeBigAd() { document.getElementById("bigAdScreen").style.display = "none"; document.getElementById("ad-large-frame").src = ""; }

        setInterval(() => { const f = document.getElementById('frame-top'); if(f) f.src = "ad.html?pos=top&t=" + Date.now(); }, 30000);
        setTimeout(() => { setInterval(() => { const f = document.getElementById('frame-bottom'); if(f) f.src = "ad.html?pos=bottom&t=" + Date.now(); }, 30000); }, 15000);
    </script>
</body>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const ui = document.getElementById("ui");
        const startScreen = document.getElementById("startScreen");
        const menuTitle = document.getElementById("menuTitle");
        const gameDesc = document.getElementById("gameDesc");
        const adMid = document.getElementById("ad-middle-container");
        const goButton = document.getElementById("goButton");
        const bestUi = document.getElementById("best-ui");
        const gameOuter = document.getElementById("game-outer");

        function resize() {
            canvas.width = gameOuter.clientWidth;
            canvas.height = gameOuter.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let score = 0, bestScore = localStorage.getItem("bark_panic_best") || 0;
        let gameActive = false, enemies = [], spawnTimer;
        bestUi.innerText = bestScore;

        goButton.onclick = () => {
            startScreen.style.display = "none";
            gameActive = true; score = 0; enemies = [];
            ui.innerText = "GUARD: 0";
            spawnEnemy(); update();

        function spawnEnemy() {
            if(!gameActive) return;
            const side = Math.floor(Math.random()*4);
            let x, y;
            if(side===0) { x=Math.random()*canvas.width; y=-30; }
            else if(side===1) { x=canvas.width+30; y=Math.random()*canvas.height; }
            else if(side===2) { x=Math.random()*canvas.width; y=canvas.height+30; }
            else { x=-30; y=Math.random()*canvas.height; }
            enemies.push({x, y, speed: 1.5 + (score/25)});
            spawnTimer = setTimeout(spawnEnemy, Math.max(400, 1000 - (score*12)));

            if(!gameActive) return;

            const tx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const ty = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            for(let i=enemies.length-1; i>=0; i--) {
                let d = Math.sqrt((tx-enemies[i].x)**2 + (ty-enemies[i].y)**2);
                if(d < 50) { 
                    enemies.splice(i, 1); 
                    score++; 
                    ui.innerText = "GUARD: "+score;
                    // 吠えたエフェクトの代わりに少し画面を揺らすなどの演出を入れるならここ
                }
            }
        }

        canvas.addEventListener("touchstart", (e) => { handleTap(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener("mousedown", handleTap);

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0,0,canvas.width, canvas.height);
            const cx = canvas.width/2, cy = canvas.height/2;
