<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bark Panic - Home Defender</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; position: fixed; touch-action: none; }
        body { background: #ffe0b2; font-family: 'Hiragino Sans', 'Meiryo', sans-serif; display: flex; flex-direction: column; }
        
        /* 上部広告：100px 固定 */
        #ad-top { width: 100%; height: 100px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 100; border-bottom: 2px solid #ff5722; }

        /* ゲームエリア：下端まで全画面表示 */
        #game-outer { flex-grow: 1; position: relative; width: 100%; background: #fff3e0; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
        
        #ui { position: absolute; top: 15px; left: 0; width: 100%; text-align: center; color: #e65100; font-size: 28px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 0 white; z-index: 20; letter-spacing: 2px; }
        
        /* メニュー/リザルト画面 */
        #startScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500;
            padding: 20px;
        }

        #menuHeader { text-align: center; margin-bottom: 10px; }
        #menuTitle { color: #ff5722; margin: 0; font-size: 32px; text-shadow: 1px 1px 0 #bf360c; }
        #best-info { font-weight: bold; color: #e65100; font-size: 20px; margin: 8px 0; background: #fff; padding: 4px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 【収益】300x250 レクタングル */
        #ad-middle-box {
            width: 300px; height: 250px; background: #f0f0f0;
            margin: 15px 0; display: none; justify-content: center; align-items: center;
            border-radius: 12px; border: 1px solid #ddd; overflow: hidden;
        }

        .btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px; }
        .main-btn { 
            padding: 18px 0; font-size: 20px; background: #ff5722; border: none; 
            border-radius: 50px; color: white; font-weight: bold; cursor: pointer; 
            width: 270px; box-shadow: 0 5px #bf360c; transition: 0.1s;
        }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 2px #bf360c; }
        .main-btn:disabled { background: #bbb; box-shadow: none; transform: none; color: #eee; }
        
        .sub-btn {
            padding: 15px 0; font-size: 16px; background: #9b59b6;
            border: none; border-radius: 50px; color: white; font-weight: bold;
            text-decoration: none; width: 270px; text-align: center;
            box-shadow: 0 5px #8e44ad;
        }

        /* 全画面広告（インタースティシャル風） */
        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 350px; background: #fff; position: relative; border-radius: 15px; }
        #close-ad-btn { position: absolute; top: -55px; right: 0; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ad-top">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-outer">
        <div id="ui">GUARD: 0</div>
        <canvas id="gameCanvas"></canvas>

        <div id="startScreen">
            <div id="menuHeader">
                <h1 id="menuTitle">Bark Panic!</h1>
                <p id="gameDesc" style="margin: 8px 0; font-size: 15px; color: #666; font-weight: bold;">泥棒をタップで追い払え！</p>
                <div id="best-info">BEST SCORE: <span id="best-ui">0</span></div>
            </div>

            <div id="ad-middle-box">
                <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="9050127185"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <div class="btn-group">
                <button id="goButton" class="main-btn">★ 家を守る！ ★</button>
                <a href="https://saaaachi.github.io/" class="sub-btn">他のゲームで遊ぶ</a>
            </div>
        </div>

        <div id="inter-screen">
            <div class="inter-content">
                <div id="close-ad-btn" onclick="closeInterAd()">5</div>
                <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:15px; background:#fff;"></iframe>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d"), ui = document.getElementById("ui"), startScreen = document.getElementById("startScreen"), menuTitle = document.getElementById("menuTitle"), gameDesc = document.getElementById("gameDesc"), adMid = document.getElementById("ad-middle-box"), goButton = document.getElementById("goButton"), bestUi = document.getElementById("best-ui"), gameOuter = document.getElementById("game-outer");

        function resize() { canvas.width = gameOuter.clientWidth; canvas.height = gameOuter.clientHeight; }
        window.addEventListener('resize', resize);
        resize();

        let score = 0, bestScore = localStorage.getItem("bark_panic_best") || 0, playCount = 0;
        let gameActive = false, enemies = [], spawnTimer, animationId;
        bestUi.innerText = bestScore;

        goButton.onclick = () => {
            startScreen.style.display = "none"; adMid.style.display = "none";
            gameActive = true; score = 0; enemies = [];
            ui.innerText = "GUARD: 0";
            spawnEnemy(); update();
        };

        function spawnEnemy() {
            if(!gameActive) return;
            const side = Math.floor(Math.random()*4);
            let x, y;
            if(side===0) { x=Math.random()*canvas.width; y=-50; }
            else if(side===1) { x=canvas.width+50; y=Math.random()*canvas.height; }
            else if(side===2) { x=Math.random()*canvas.width; y=canvas.height+50; }
            else { x=-50; y=Math.random()*canvas.height; }
            
            enemies.push({x, y, speed: 1.8 + (score/20), size: 45});
            spawnTimer = setTimeout(spawnEnemy, Math.max(350, 1100 - (score*15)));
        }

        function handleTap(e) {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const tx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const ty = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            
            for(let i=enemies.length-1; i>=0; i--) {
                let d = Math.sqrt((tx-enemies[i].x)**2 + (ty-enemies[i].y)**2);
                if(d < 60) { 
                    enemies.splice(i, 1); 
                    score++; 
                    ui.innerText = "GUARD: "+score; 
                }
            }
        }
        canvas.addEventListener("touchstart", (e) => { handleTap(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener("mousedown", handleTap);

        function update() {
            if(!gameActive) return;
            ctx.clearRect(0,0,canvas.width, canvas.height);
            const cx = canvas.width/2, cy = canvas.height/2;
            
            ctx.font = "80px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText("🏠", cx, cy);
            
            ctx.font = "45px Arial";
            for(let i=enemies.length-1; i>=0; i--) {
                let en = enemies[i];
                let angle = Math.atan2(cy - en.y, cx - en.x);
                en.x += Math.cos(angle) * en.speed; en.y += Math.sin(angle) * en.speed;
                
                ctx.fillText("👤", en.x, en.y);
                
                if(Math.sqrt((cx-en.x)**2 + (cy-en.y)**2) < 40) { gameOver(); return; }
            }
            animationId = requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false; playCount++;
            clearTimeout(spawnTimer);
            cancelAnimationFrame(animationId);
            
            if(score > bestScore) {
                bestScore = score;
                localStorage.setItem("bark_panic_best", bestScore);
                bestUi.innerText = bestScore;
            }
            
            menuTitle.innerText = "泥棒に侵入された！";
            menuTitle.style.color = "#d32f2f";
            gameDesc.innerText = "今回の記録: " + score;
            
            goButton.innerText = "お待ちください..."; 
            goButton.disabled = true;
            adMid.style.display = "flex";
            startScreen.style.display = "flex";

            setTimeout(() => { 
                goButton.disabled = false; 
                goButton.innerText = "もう一度守る！"; 
            }, 1500);

            if (playCount % 2 === 0) { setTimeout(showInterAd, 500); }
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), closeBtn = document.getElementById("close-ad-btn"), ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let timerVal = 5;
            closeBtn.innerText = timerVal; closeBtn.style.pointerEvents = "none";
            const countdown = setInterval(() => {
                timerVal--;
                if (timerVal > 0) closeBtn.innerText = timerVal;
                else {
                    clearInterval(countdown);
                    closeBtn.innerText = "×";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }

        window.onload = () => { startScreen.style.display = "flex"; };
    </script>
</body>
</html>
